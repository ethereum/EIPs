# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.pages-check.outputs.enabled }}
      artifact_uploaded: ${{ steps.upload.outcome == 'success' }}
    steps:
      - name: Checkout EIPs
        uses: actions/checkout@v7.0.1
        with:
          repository: ethereum/EIPs
          path: ''
      - name: Merge Repos
        uses: ./.github/actions/merge-repos
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # Not needed with a .ruby-version file
          bundler-cache: false
      - name: Install Ruby dependencies
        run: bundle install --jobs 4 --retry 3
      - name: Check Pages site availability
        id: pages-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" || true)

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Pages site is available for this repository."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Pages site is not accessible (HTTP $status); skipping artifact upload and deploy."
          fi
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          JEKYLL_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifact
        id: upload
        if: github.repository == 'ethereum/EIPs' && steps.pages-check.outputs.enabled == 'true'
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v5

  # Deployment job
  deploy:
    if: github.repository == 'ethereum/EIPs' && needs.build.outputs.pages_enabled == 'true' && needs.build.outputs.artifact_uploaded == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
