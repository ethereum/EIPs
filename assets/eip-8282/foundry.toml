[profile.default]
src = "src"
test = "test"
out = "out"
cache_path = "cache"

# The predeploys target the same EVM the sys-asm contracts target.
evm_version = "prague"

# Tests assemble the .eas sources by shelling out to `geas` (see test/Geas.sol),
# exactly as ethereum/sys-asm's own Foundry suite does.
ffi = true
